<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>งานอาจารย์โอ๋-คณิตพื้นฐาน-โปรแกรมเลขยกกำลัง</title>
<style>
  * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { margin: 0; background: #f4f4f4; }

  .title-bar {
    background: #5c5c5c;
    color: white;
    text-align: center;
    padding: 18px 10px;
    font-size: 20px;
    font-weight: 600;
  }

  .main {
    display: flex;
    gap: 16px;
    padding: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .left-panel {
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .right-panel {
    flex: 1;
    min-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ---- graph selector (purple) ---- */
  .selector-box {
    background: #ede7f6;
    border: 2px solid #7e57c2;
    border-radius: 10px;
    padding: 10px;
  }
  .selector-header {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
  }
  .dot {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.2);
    flex-shrink: 0;
  }
  .selector-header span { font-size: 13px; color: #333; flex: 1; }
  .chevron { transition: transform 0.15s; font-size: 12px; color: #555; }
  .chevron.open { transform: rotate(180deg); }

  .graph-list {
    margin-top: 8px;
    display: none;
    flex-direction: column;
    gap: 6px;
  }
  .graph-list.open { display: flex; }
  .graph-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    background: white;
    border: 1px solid #ddd;
  }
  .graph-item.active { border-color: #7e57c2; background: #f3eefc; }
  .graph-item span { font-size: 12px; color: #333; flex: 1; }
  .del-btn {
    border: none; background: none; color: #999; cursor: pointer; font-size: 14px;
    padding: 0 4px;
  }
  .del-btn:hover { color: #e53935; }

  .add-btn {
    margin-top: 6px;
    width: 100%;
    padding: 6px;
    border-radius: 6px;
    border: 1px dashed #7e57c2;
    background: white;
    color: #7e57c2;
    cursor: pointer;
    font-size: 13px;
  }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- equation display ---- */
  .equation-box {
    background: white;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    color: #333;
  }
  .equation-box .eq-label { color: #777; margin-right: 6px; }
  .equation-box sup { font-size: 11px; }

  /* ---- controls (yellow) ---- */
  .controls-box {
    background: #fff9c4;
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .label-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .label-line label {
    font-size: 14px;
    font-weight: 600;
  }
  .slider-line {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-line span.bound { font-size: 11px; color: #777; width: 34px; text-align: center; }
  .slider-line input[type=range] { flex: 1; }
  .value-input {
    width: 70px;
    padding: 4px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    text-align: center;
  }
  .cap-input {
    width: 44px;
    padding: 4px 4px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 11px;
    text-align: center;
    color: #555;
  }

  /* ---- graph canvas (green) ---- */
  .canvas-wrap {
    background: #c8e6c9;
    border-radius: 10px;
    padding: 8px;
    border: 2px solid #2e7d32;
  }
  #graphCanvas {
    width: 100%;
    height: 340px;
    display: block;
    background: white;
    border-radius: 6px;
    cursor: grab;
  }
  #graphCanvas:active { cursor: grabbing; }

  /* ---- terminal (orange) ---- */
  .terminal-box {
    background: #1e1e1e;
    border: 2px solid #e0824a;
    border-radius: 10px;
    padding: 10px 12px;
    height: 130px;
    overflow-y: auto;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    color: #8bc34a;
  }
  .terminal-box .err { color: #ff6b6b; }
  .terminal-box .info { color: #8bc34a; }

  /* ---- names (blue) ---- */
  .names-box {
    background: #bbdefb;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .names-box p {
    margin: 0;
    font-size: 14px;
    color: #0d47a1;
  }
</style>
</head>
<body>

<div class="title-bar">งานอาจารย์โอ๋-คณิตพื้นฐาน-โปรแกรมเลขยกกำลัง</div>

<div class="main">

  <div class="left-panel">

    <div class="selector-box">
      <div class="selector-header" id="selectorHeader">
        <div class="dot" id="activeDot"></div>
        <span id="activeLabel">กราฟที่ 1</span>
        <span class="chevron" id="chevron">▼</span>
      </div>
      <div class="graph-list" id="graphList"></div>
      <button class="add-btn" id="addBtn">+ เพิ่มกราฟ</button>
    </div>

    <div class="equation-box">
      <span class="eq-label">สมการ :</span><span>y = c&middot;b<sup>rx</sup>+h</span>
    </div>

    <div class="controls-box">
      <div class="control-row">
        <div class="label-line">
          <label>c =</label>
          <input type="number" class="value-input" id="input_c" step="0.1">
        </div>
        <div class="slider-line">
          <span class="bound" id="capNeg_c">-120</span>
          <input type="range" id="slider_c" min="-120" max="120" step="0.1">
          <input type="number" class="cap-input" id="cap_c" value="120" min="0" max="9999" step="1">
        </div>
      </div>
      <div class="control-row">
        <div class="label-line">
          <label>b =</label>
          <input type="number" class="value-input" id="input_b" step="0.1">
        </div>
        <div class="slider-line">
          <span class="bound" id="capNeg_b">-120</span>
          <input type="range" id="slider_b" min="-120" max="120" step="0.1">
          <input type="number" class="cap-input" id="cap_b" value="120" min="0" max="9999" step="1">
        </div>
      </div>
      <div class="control-row">
        <div class="label-line">
          <label>r =</label>
          <input type="number" class="value-input" id="input_r" step="0.1">
        </div>
        <div class="slider-line">
          <span class="bound" id="capNeg_r">-120</span>
          <input type="range" id="slider_r" min="-120" max="120" step="0.1">
          <input type="number" class="cap-input" id="cap_r" value="120" min="0" max="9999" step="1">
        </div>
      </div>
      <div class="control-row">
        <div class="label-line">
          <label>h =</label>
          <input type="number" class="value-input" id="input_h" step="0.1">
        </div>
        <div class="slider-line">
          <span class="bound" id="capNeg_h">-120</span>
          <input type="range" id="slider_h" min="-120" max="120" step="0.1">
          <input type="number" class="cap-input" id="cap_h" value="120" min="0" max="9999" step="1">
        </div>
      </div>
    </div>

  </div>

  <div class="right-panel">
    <div class="canvas-wrap">
      <canvas id="graphCanvas"></canvas>
    </div>
    <div class="terminal-box" id="terminal"></div>
    <div class="names-box">
      <p>นาย ธัญเทพ เพชรแก้ว เลขที่ 7</p>
      <p>นาย กันต์กวี วัฒนกุล เลขที่ 10</p>
    </div>
  </div>

</div>

<script>
const COLORS = ['#e53935', '#43a047', '#1e88e5', '#8e24aa', '#fdd835'];
const COLOR_NAMES = ['แดง', 'เขียว', 'ฟ้า', 'ม่วง', 'เหลือง'];
const CAP = 9999;

let graphs = [{ colorIndex: 0, c: 1, b: 2, r: 1, h: 0 }];
let activeIndex = 0;
let caps = { c: 120, b: 120, r: 120, h: 120 };

let view = { xMin: -10, xMax: 10, yMin: -6, yMax: 6 };

const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');

function log(message, isError) {
  const term = document.getElementById('terminal');
  const line = document.createElement('div');
  line.className = isError ? 'err' : 'info';
  const time = new Date().toLocaleTimeString('th-TH', { hour12: false });
  line.textContent = `[${time}] ${message}`;
  term.appendChild(line);
  term.scrollTop = term.scrollHeight;
}

function clampCap(val) {
  if (isNaN(val)) return 0;
  if (val > CAP) { log(`ค่าที่ใส่เกินขีดจำกัด ถูกปรับเป็น ${CAP}`, true); return CAP; }
  if (val < -CAP) { log(`ค่าที่ใส่ต่ำกว่าขีดจำกัด ถูกปรับเป็น -${CAP}`, true); return -CAP; }
  return val;
}

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  draw();
}

function toPixel(x, y) {
  const w = canvas.width, h = canvas.height;
  const px = ((x - view.xMin) / (view.xMax - view.xMin)) * w;
  const py = h - ((y - view.yMin) / (view.yMax - view.yMin)) * h;
  return [px, py];
}

function niceStep(range) {
  const raw = range / 10;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3.5) step = 2;
  else if (norm < 7.5) step = 5;
  else step = 10;
  return step * mag;
}

function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  const stepX = niceStep(view.xMax - view.xMin);
  const stepY = niceStep(view.yMax - view.yMin);

  ctx.font = `${11 * devicePixelRatio}px sans-serif`;
  ctx.fillStyle = '#999';

  for (let gx = Math.ceil(view.xMin / stepX) * stepX; gx <= view.xMax; gx += stepX) {
    const [px] = toPixel(gx, 0);
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px, h);
    ctx.stroke();
    if (Math.abs(gx) > stepX / 100) ctx.fillText(gx.toFixed(2).replace(/\.?0+$/, ''), px + 3, toPixel(0,0)[1] - 4);
  }
  for (let gy = Math.ceil(view.yMin / stepY) * stepY; gy <= view.yMax; gy += stepY) {
    const [, py] = toPixel(0, gy);
    ctx.beginPath();
    ctx.moveTo(0, py);
    ctx.lineTo(w, py);
    ctx.stroke();
    if (Math.abs(gy) > stepY / 100) ctx.fillText(gy.toFixed(2).replace(/\.?0+$/, ''), toPixel(0,0)[0] + 4, py - 3);
  }

  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  const [ox, oy] = toPixel(0, 0);
  ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, h); ctx.stroke();

  graphs.forEach((g) => {
    ctx.strokeStyle = COLORS[g.colorIndex];
    ctx.lineWidth = 2 * devicePixelRatio;
    ctx.beginPath();
    let penDown = false;
    const samples = w;
    for (let i = 0; i <= samples; i++) {
      const x = view.xMin + (i / samples) * (view.xMax - view.xMin);
      let y;
      try {
        y = g.c * Math.pow(g.b, g.r * x) + g.h;
      } catch (e) {
        y = NaN;
      }
      if (!isFinite(y) || isNaN(y)) { penDown = false; continue; }
      const [px, py] = toPixel(x, y);
      if (!penDown) { ctx.moveTo(px, py); penDown = true; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  });
}

let lastReportedInvalidBase = new Set();
function checkEdgeCases(g, idx) {
  if (g.b <= 0) {
    const key = idx + '-basezero';
    if (!lastReportedInvalidBase.has(key)) {
      log(`กราฟสี${COLOR_NAMES[g.colorIndex]}: ค่า b = ${g.b} ทำให้สมการไม่นิยามในบางช่วงของ x (ฐานต้องมากกว่า 0)`, true);
      lastReportedInvalidBase.add(key);
    }
  } else {
    lastReportedInvalidBase.delete(idx + '-basezero');
  }
}

function renderGraphList() {
  const list = document.getElementById('graphList');
  list.innerHTML = '';
  graphs.forEach((g, idx) => {
    const item = document.createElement('div');
    item.className = 'graph-item' + (idx === activeIndex ? ' active' : '');
    item.innerHTML = `<div class="dot" style="background:${COLORS[g.colorIndex]}"></div><span>กราฟที่ ${idx + 1} (${COLOR_NAMES[g.colorIndex]})</span>`;
    item.addEventListener('click', () => { activeIndex = idx; refreshAll(); });
    if (graphs.length > 1) {
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '×';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        graphs.splice(idx, 1);
        if (activeIndex >= graphs.length) activeIndex = graphs.length - 1;
        refreshAll();
      });
      item.appendChild(del);
    }
    list.appendChild(item);
  });
  document.getElementById('addBtn').disabled = graphs.length >= 5;
}

function refreshControls() {
  const g = graphs[activeIndex];
  document.getElementById('activeDot').style.background = COLORS[g.colorIndex];
  document.getElementById('activeLabel').textContent = `กราฟที่ ${activeIndex + 1} (${COLOR_NAMES[g.colorIndex]})`;
  ['c', 'b', 'r', 'h'].forEach((key) => {
    const cap = caps[key];
    document.getElementById('slider_' + key).value = Math.max(-cap, Math.min(cap, g[key]));
    document.getElementById('input_' + key).value = g[key];
  });
}

function applyCap(key, capVal) {
  if (isNaN(capVal) || capVal < 0) capVal = 120;
  if (capVal > CAP) {
    log(`ค่า Cap ของ ${key} เกินขีดจำกัดสูงสุด ถูกปรับเป็น ${CAP}`, true);
    capVal = CAP;
  }
  caps[key] = capVal;
  document.getElementById('cap_' + key).value = capVal;
  document.getElementById('capNeg_' + key).textContent = '-' + capVal;
  const slider = document.getElementById('slider_' + key);
  slider.min = -capVal;
  slider.max = capVal;
  const g = graphs[activeIndex];
  slider.value = Math.max(-capVal, Math.min(capVal, g[key]));
}

function refreshAll() {
  renderGraphList();
  refreshControls();
  checkEdgeCases(graphs[activeIndex], activeIndex);
  draw();
}

document.getElementById('selectorHeader').addEventListener('click', () => {
  document.getElementById('graphList').classList.toggle('open');
  document.getElementById('chevron').classList.toggle('open');
});

document.getElementById('addBtn').addEventListener('click', () => {
  if (graphs.length >= 5) return;
  const usedColors = graphs.map(g => g.colorIndex);
  const nextColor = COLORS.findIndex((_, i) => !usedColors.includes(i));
  graphs.push({ colorIndex: nextColor, c: 1, b: 2, r: 1, h: 0 });
  activeIndex = graphs.length - 1;
  log(`เพิ่มกราฟที่ ${graphs.length} (สี${COLOR_NAMES[nextColor]}) แล้ว`, false);
  refreshAll();
});

['c', 'b', 'r', 'h'].forEach((key) => {
  const slider = document.getElementById('slider_' + key);
  const input = document.getElementById('input_' + key);

  slider.addEventListener('input', () => {
    graphs[activeIndex][key] = parseFloat(slider.value);
    input.value = slider.value;
    checkEdgeCases(graphs[activeIndex], activeIndex);
    draw();
  });

  input.addEventListener('change', () => {
    let val = clampCap(parseFloat(input.value));
    graphs[activeIndex][key] = val;
    input.value = val;
    slider.value = Math.max(-caps[key], Math.min(caps[key], val));
    checkEdgeCases(graphs[activeIndex], activeIndex);
    draw();
  });

  const capInput = document.getElementById('cap_' + key);
  capInput.addEventListener('change', () => {
    applyCap(key, parseFloat(capInput.value));
    draw();
  });
});

let isDragging = false;
let dragStart = { x: 0, y: 0 };
let viewStart = null;

canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  viewStart = { ...view };
});
window.addEventListener('mouseup', () => { isDragging = false; });
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const dxPix = e.clientX - dragStart.x;
  const dyPix = e.clientY - dragStart.y;
  const dx = (dxPix / rect.width) * (viewStart.xMax - viewStart.xMin);
  const dy = (dyPix / rect.height) * (viewStart.yMax - viewStart.yMin);
  view.xMin = viewStart.xMin - dx;
  view.xMax = viewStart.xMax - dx;
  view.yMin = viewStart.yMin + dy;
  view.yMax = viewStart.yMax + dy;
  draw();
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.1 : 0.9;
  const rect = canvas.getBoundingClientRect();
  const mx = view.xMin + ((e.clientX - rect.left) / rect.width) * (view.xMax - view.xMin);
  const my = view.yMin + (1 - (e.clientY - rect.top) / rect.height) * (view.yMax - view.yMin);
  view.xMin = mx + (view.xMin - mx) * factor;
  view.xMax = mx + (view.xMax - mx) * factor;
  view.yMin = my + (view.yMin - my) * factor;
  view.yMax = my + (view.yMax - my) * factor;
  draw();
}, { passive: false });

window.addEventListener('resize', resizeCanvas);

log('เริ่มโปรแกรมสำเร็จ', false);
renderGraphList();
refreshControls();
resizeCanvas();
</script>

</body>
</html>
